name: Ruby CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Install dependencies
      run: |
        gem install rubocop
        bundle install

    - name: Run RuboCop
      run: rubocop

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - '3.2'   # security maintenance
          - '3.3'   # stable maintenance
          - '3.4'   # current
          - '4.0'   # latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby ${{ matrix.ruby-version }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true

    - name: Install dependencies
      run: bundle install

    - name: Run tests
      run: bundle exec rake test

    - name: Upload coverage results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report-ruby-${{ matrix.ruby-version }}
        path: coverage
        retention-days: 7

    - name: Check test coverage
      run: |
        COVERAGE=$(grep -A 2 "Coverage" coverage/.last_run.json | tail -n 1 | cut -d ":" -f 2 | cut -d "}" -f 1 | tr -d " ")
        echo "Coverage: $COVERAGE%"
        if (( $(echo "$COVERAGE < 90" | bc -l) )); then
          echo "Test coverage is below 90%"
          exit 1
        fi

  shell-test:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Verify install.sh syntax
      run: bash -n scripts/install.sh

    - name: Run install.sh tests
      run: bash scripts/test_install_pkg.sh

    - name: Verify install_aria2.sh syntax
      run: bash -n scripts/install_aria2.sh
